name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']   # add or remove as you like
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install DSSP
        run: |
          sudo apt-get update
          sudo apt-get install -y dssp

      - name: Install CPU-only PyTorch
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch

      - name: Install dependencies
        run: |
          python -m pip install -e ".[test]"

      - name: Run Ruff
        if: matrix.python-version == '3.11'
        run: |
          ruff check src tests

      - name: Run tests
        run: |
          pytest tests/ -v --cov --cov-report=term --cov-report=xml -m "not integration"
          pytest tests/ -v -m "integration"

      - name: Upload coverage to Coveralls
        if: matrix.python-version == '3.13'   # only upload from 3.13
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
