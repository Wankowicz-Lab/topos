[project]
name = "biogenesis"
version = "0.1.0"
description = "A toolkit for computing and analyzing sequence/structure metrics in proteins"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Stephanie Wankowicz, Noah Greenwald"}]
dependencies = [
  "biotite",   
  "numpy>=1.24",
  "pandas>=2.0",
  "scipy>=1.11",
  "matplotlib>=3.8",
  "blosum"
]

[project.optional-dependencies]
test = ["pytest", "pytest-cov", "coveralls", "ruff", "mypy"]

